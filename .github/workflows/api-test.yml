name: API Test

on:
  push:
    branches: [main, "feat/**", "fix/**"]
    paths:
      - "apps/api/**"
      - ".github/workflows/api-test.yml"
  pull_request:
    paths:
      - "apps/api/**"
      - ".github/workflows/api-test.yml"
  workflow_dispatch:

concurrency:
  group: api-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    defaults:
      run:
        working-directory: apps/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen || uv sync

      - name: Run pytest with coverage
        env:
          ZHZG_DATABASE_URL: "sqlite:///./data/test.db"
          ZHZG_REQUIRE_AUTH: "false"
          ZHZG_ENABLE_DEMO_SEED: "false"
          ZHZG_MONITOR_SCHEDULER_ENABLED: "false"
        run: |
          uv run pytest \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            -q

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage-${{ matrix.python-version }}
          path: apps/api/coverage.xml
          if-no-files-found: ignore
          retention-days: 14

  smoke:
    name: smoke_test.py
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v3
      - run: uv sync
      - name: Run smoke test
        env:
          ZHZG_DATABASE_URL: "sqlite:///./data/smoke.db"
          ZHZG_REQUIRE_AUTH: "false"
          ZHZG_MONITOR_SCHEDULER_ENABLED: "false"
        run: uv run python scripts/smoke_test.py
